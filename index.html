<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BTC Assistant | by JSculptor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
        }
        .container { 
            background: #1e293b; padding: 35px; border-radius: 25px; 
            width: 420px; text-align: center; border: 1px solid #334155;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .author { color: #6366f1; font-weight: bold; font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 20px; }
        .price { font-size: 3.5rem; font-weight: 800; color: #f8fafc; margin-bottom: 20px; }
        
        .signal-box { 
            background: #0f172a; padding: 20px; border-radius: 15px; 
            margin: 20px 0; border: 1px solid #334155;
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        .grid-item span { display: block; font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; }
        .grid-item b { font-size: 1rem; }

        .status { 
            padding: 15px; border-radius: 12px; font-weight: bold; 
            text-transform: uppercase; border: 1px solid; transition: 0.5s;
        }
        .socials { margin-top: 25px; }
        .socials a { color: #94a3b8; margin: 0 10px; text-decoration: none; font-size: 1.2rem; transition: 0.3s; }
        .socials a:hover { color: #6366f1; }
    </style>
</head>
<body>

<div class="container">
    <div class="author">DEV: JSCULPTOR</div>
    <div style="color: #94a3b8; font-size: 0.7rem; letter-spacing: 2px;">BITCOIN / USDT</div>
    <div id="price" class="price">$0.00</div>

    <div id="status" class="status">СИНХРОНИЗАЦИЯ...</div>

    <div class="signal-box">
        <div style="font-size: 0.7rem; color: #6366f1; font-weight: bold;">ТОЧНЫЙ СИГНАЛ (ENTRY DATA)</div>
        <div class="grid">
            <div class="grid-item"><span>Вход</span><b id="entry">---</b></div>
            <div class="grid-item"><span>TP (Profit)</span><b id="tp" style="color: #10b981;">---</b></div>
            <div class="grid-item"><span>SL (Stop)</span><b id="sl" style="color: #ef4444;">---</b></div>
        </div>
    </div>

    <div class="socials">
        <a href="https://instagram.com/JSCULPTOR" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-telegram"></i></a>
        <a href="#"><i class="fab fa-github"></i></a>
    </div>
    <div style="margin-top: 15px; font-size: 0.7rem; color: #475569;">© 2026 JSculptor Trading Bot</div>
</div>

<script>
    async function updateUI() {
        try {
            const res = await fetch('http://localhost:3000/api/data');
            const data = await res.json();
            
            document.getElementById('price').innerText = '$' + data.price.toLocaleString();
            
            // Заполнение сигналов
            document.getElementById('entry').innerText = data.entry !== "---" ? '$' + data.entry.toLocaleString() : "---";
            document.getElementById('tp').innerText = data.tp !== "---" ? '$' + Number(data.tp).toLocaleString() : "---";
            document.getElementById('sl').innerText = data.sl !== "---" ? '$' + Number(data.sl).toLocaleString() : "---";
            
            const st = document.getElementById('status');
            st.innerText = data.status;
            st.style.color = data.color;
            st.style.borderColor = data.color;
            st.style.background = data.color + '10'; // легкая заливка фона
        } catch (e) { console.error("Бэкенд не отвечает..."); }
    }
    setInterval(updateUI, 3000);
    updateUI();
</script>

</body>
</html>
