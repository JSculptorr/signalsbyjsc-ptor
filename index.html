<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSculptor AI | Premium Trading Signals</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --bg: #030712;
            --card: rgba(30, 41, 59, 0.7);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --win: #10b981;
            --loss: #f43f5e;
            --active: #f59e0b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(79, 70, 229, 0.1) 0%, transparent 50%);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 480px; animation: fadeIn 0.8s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* HEADER & LOGO */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; width: 100%; }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon { 
            width: 35px; height: 35px; background: var(--accent); border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .logo-text { font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; }

        /* MAIN PRICE CARD */
        .main-card {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 28px;
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        .main-card::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, var(--accent-glow), transparent 30%);
            animation: rotate 10s linear infinite; opacity: 0.3;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .price-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; position: relative; }
        .price { font-size: 3.2rem; font-weight: 800; margin: 10px 0; color: #fff; position: relative; }

        /* STATS */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
        .stat-box { 
            background: var(--card); backdrop-filter: blur(8px); 
            padding: 15px; border-radius: 20px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stat-box span { display: block; font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
        .stat-box b { font-size: 1.1rem; font-weight: 700; }

        /* ALERT */
        #new-signal-alert { 
            display: none; background: linear-gradient(90deg, #f59e0b, #fbbf24); color: #000; 
            padding: 15px; border-radius: 18px; margin-bottom: 20px; font-weight: 700;
            text-align: center; box-shadow: 0 10px 30px rgba(245, 158, 11, 0.3);
        }

        /* LISTS */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin: 25px 5px 15px; }
        .section-title { font-size: 0.85rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
        
        .signal-item {
            background: var(--card); backdrop-filter: blur(8px);
            padding: 18px; border-radius: 22px; margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; justify-content: space-between; align-items: center;
            transition: transform 0.2s;
        }
        .signal-item:hover { transform: scale(1.02); border-color: rgba(99, 102, 241, 0.3); }

        .sig-badge { padding: 6px 12px; border-radius: 10px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }

        /* NAV BUTTONS */
        .nav-bar { display: flex; gap: 10px; width: 100%; margin-top: 20px; }
        .nav-btn {
            flex: 1; background: var(--card); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 12px; border-radius: 15px; font-size: 0.8rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: 0.3s;
        }
        .nav-btn:hover { background: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-microchip"></i></div>
            <div class="logo-text">JSCULPTOR <span style="color: var(--accent)">AI</span></div>
        </div>
        <div id="connection-status" style="font-size: 0.6rem; color: var(--win)">● LIVE ANALYTICS</div>
    </div>

    <div class="main-card">
        <div class="price-label">Bitcoin / USDT</div>
        <div class="price" id="price">$0.00</div>
        <div style="font-size: 0.7rem; color: var(--text-dim); position: relative;">Neural Network Update: 30s</div>
    </div>

    <div class="stats-grid">
        <div class="stat-box"><span>Total</span><b id="st-total">0</b></div>
        <div class="stat-box"><span>Profit</span><b id="st-wins" style="color: var(--win)">0</b></div>
        <div class="stat-box"><span>Accuracy</span><b id="st-wr">0%</b></div>
    </div>

    <div id="new-signal-alert"></div>

    <div class="section-header">
        <div class="section-title"><i class="fas fa-bolt" style="color: var(--active)"></i> Active Analysis</div>
    </div>
    <div id="active-list">
        <div style="text-align: center; color: var(--text-dim); font-size: 0.8rem; padding: 20px;">Scanning market for signals...</div>
    </div>

    <div class="section-header">
        <div class="section-title"><i class="fas fa-history"></i> Trade History</div>
    </div>
    <div id="history-list"></div>

    <div class="nav-bar">
        <button class="nav-btn" onclick="window.location.reload()"><i class="fas fa-sync"></i> Refresh</button>
        <button class="nav-btn"><i class="fab fa-telegram"></i> Community</button>
    </div>

    <div style="text-align: center; margin-top: 30px; font-size: 0.65rem; color: var(--text-dim); opacity: 0.5;">
        © 2026 JSculptor Terminal • Institutional Grade Signals
    </div>
</div>

<script>
    let lastSignalId = null;

    async function fetchData() {
        try {
            const res = await fetch('https://signalsbyjsc-ptor.onrender.com/api/data');
            const data = await res.json();

            // Price update
            document.getElementById('price').innerText = '$' + data.price.toLocaleString();
            
            // Stats update
            document.getElementById('st-total').innerText = data.stats.total;
            document.getElementById('st-wins').innerText = data.stats.wins;
            document.getElementById('st-wr').innerText = data.stats.winRate + '%';

            const allSignals = data.signals || [];
            
            // Alert logic
            const activeOnly = allSignals.filter(s => s.status === 'active');
            if (activeOnly.length > 0) {
                const latest = activeOnly[activeOnly.length - 1];
                if (latest.id !== lastSignalId) {
                    lastSignalId = latest.id;
                    const alertDiv = document.getElementById('new-signal-alert');
                    alertDiv.style.display = 'block';
                    alertDiv.innerHTML = `<i class="fas fa-fire"></i> NEW ${latest.type} SIGNAL: $${latest.entry}`;
                    setTimeout(() => { alertDiv.style.display = 'none'; }, 30000);
                }
            }

            renderSignals(allSignals);

        } catch (e) {
            document.getElementById('connection-status').innerText = '○ DISCONNECTED';
            document.getElementById('connection-status').style.color = 'var(--loss)';
        }
    }

    function renderSignals(signals) {
        const activeCont = document.getElementById('active-list');
        const historyCont = document.getElementById('history-list');
        
        if (signals.filter(s => s.status === 'active').length > 0) activeCont.innerHTML = '';
        historyCont.innerHTML = '';

        [...signals].reverse().forEach(s => {
            const color = s.status === 'win' ? 'var(--win)' : (s.status === 'loss' ? 'var(--loss)' : 'var(--active)');
            const icon = s.type === 'BUY' ? 'fa-arrow-trend-up' : 'fa-arrow-trend-down';
            
            const card = `
                <div class="signal-item">
                    <div>
                        <div style="font-weight: 700; color: ${s.type === 'BUY' ? 'var(--win)' : 'var(--loss)'}">
                            <i class="fas ${icon}"></i> ${s.type} ${s.pair}
                        </div>
                        <div style="font-size: 0.7rem; color: var(--text-dim); margin-top: 4px;">
                            Entry: $${s.entry} | TP: $${s.tp}
                        </div>
                    </div>
                    <div class="sig-badge" style="background: ${color}15; color: ${color}; border: 1px solid ${color}30">
                        ${s.status}
                    </div>
                </div>
            `;

            if (s.status === 'active') {
                activeCont.innerHTML += card;
            } else if (s.status === 'win' || s.status === 'loss') {
                historyCont.innerHTML += card;
            }
        });
    }

    setInterval(fetchData, 5000);
    fetchData();
</script>

</body>
</html>
