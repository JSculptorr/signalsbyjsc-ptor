<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BTC Assistant | by JSculptor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; width: 350px; border: 1px solid #334155; }
        .brand { font-size: 0.8rem; letter-spacing: 2px; color: #6366f1; margin-bottom: 1rem; font-weight: bold; }
        .price { font-size: 3rem; font-weight: 800; margin: 10px 0; }
        .status { padding: 8px 15px; border-radius: 10px; font-weight: bold; margin: 15px 0; border: 2px solid #6366f1; transition: 0.5s; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; font-size: 0.75rem; }
        .grid-item { background: #0f172a; padding: 10px; border-radius: 8px; }
        .grid-item span { display: block; color: #94a3b8; margin-bottom: 5px; }
        .socials { margin-top: 20px; display: flex; justify-content: center; gap: 15px; }
        .socials a { color: #94a3b8; font-size: 1.2rem; transition: 0.3s; }
        .socials a:hover { color: #6366f1; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand">DEV: JSCULPTOR</div>
    <div style="font-size: 0.7rem; color: #94a3b8;">BITCOIN / USDT</div>
    <div class="price" id="price">$0.00</div>
    <div id="status" class="status">СИНХРОНИЗАЦИЯ...</div>

    <div class="grid">
        <div class="grid-item"><span>ВХОД</span><b id="entry">---</b></div>
        <div class="grid-item"><span>TP (PROFIT)</span><b id="tp" style="color: #10b981;">---</b></div>
        <div class="grid-item"><span>SL (STOP)</span><b id="sl" style="color: #ef4444;">---</b></div>
    </div>

    <div class="socials">
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-telegram"></i></a>
        <a href="#"><i class="fab fa-github"></i></a>
    </div>
    <div style="margin-top: 15px; font-size: 0.6rem; color: #475569;">© 2026 JSculptor Trading Bot</div>
</div>

<script>
    async function updateUI() {
        try {
            // ВАЖНО: Мы стучимся именно в твой API на Render
            const res = await fetch('https://signalsbyjsc-ptor.onrender.com/api/data');
            const data = await res.json();

            document.getElementById('price').innerText = '$' + data.price.toLocaleString();
            document.getElementById('status').innerText = data.status;
            document.getElementById('status').style.borderColor = data.color;
            document.getElementById('status').style.color = data.color;
            
            document.getElementById('entry').innerText = data.entry === "---" ? "---" : '$' + data.entry.toLocaleString();
            document.getElementById('tp').innerText = data.tp === "---" ? "---" : '$' + data.tp.toLocaleString();
            document.getElementById('sl').innerText = data.sl === "---" ? "---" : '$' + data.sl.toLocaleString();

        } catch (e) {
            console.error("Бэкенд еще спит...");
        }
    }
    setInterval(updateUI, 5000);
    updateUI();
</script>

</body>
</html>
