<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>JSculptor AI Trading Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; --win: #10b981; --loss: #ef4444; --active: #f59e0b; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; }
        
        .main-card { background: var(--card); padding: 25px; border-radius: 24px; text-align: center; border: 1px solid #334155; box-shadow: 0 15px 35px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .brand { font-size: 0.7rem; letter-spacing: 3px; color: var(--accent); font-weight: bold; margin-bottom: 10px; }
        .price { font-size: 3rem; font-weight: 800; margin: 10px 0; letter-spacing: -1px; }

        /* Сетка статистики */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { background: var(--card); padding: 12px; border-radius: 15px; text-align: center; border: 1px solid #334155; }
        .stat-box span { display: block; font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; }
        .stat-box b { font-size: 1rem; }

        /* Алерт нового сигнала */
        #new-signal-alert { display: none; background: var(--active); color: #000; padding: 15px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; text-align: center; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        /* Списки сигналов */
        .list-title { font-size: 0.8rem; color: #64748b; margin: 20px 0 10px 5px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .signal-item { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 10px; border-left: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .sig-meta { font-size: 0.7rem; color: #94a3b8; margin-top: 4px; }
        .badge { font-size: 0.65rem; padding: 4px 10px; border-radius: 6px; font-weight: 800; text-transform: uppercase; }

        .socials { margin-top: 30px; display: flex; justify-content: center; gap: 20px; opacity: 0.5; }
        .socials a { color: white; font-size: 1.2rem; transition: 0.3s; }
        .socials a:hover { color: var(--accent); opacity: 1; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card">
        <div class="brand">DEV: JSCULPTOR AI</div>
        <div class="price" id="price">$0.00</div>
        <div style="font-size: 0.7rem; color: #475569;">AI ANALYTICS • BTC/USDT</div>
    </div>

    <div class="stats-grid">
        <div class="stat-box"><span>Total Trades</span><b id="st-total">0</b></div>
        <div class="stat-box"><span>Wins</span><b id="st-wins" style="color: var(--win)">0</b></div>
        <div class="stat-box"><span>Win Rate</span><b id="st-wr">0%</b></div>
    </div>

    <div id="new-signal-alert">🔥 ОБНАРУЖЕН НОВЫЙ СИГНАЛ!</div>

    <div class="list-title">Активные сигналы (2ч)</div>
    <div id="active-list"></div>

    <div class="list-title">История сделок</div>
    <div id="history-list"></div>

    <div class="socials">
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-telegram"></i></a>
    </div>
</div>

<script>
    let lastKnownSignalId = null;

    async function updateDashboard() {
        try {
            const res = await fetch('https://signalsbyjsc-ptor.onrender.com/api/data');
            const data = await res.json();

            // Обновляем цену и статистику
            document.getElementById('price').innerText = '$' + data.price.toLocaleString();
            document.getElementById('st-total').innerText = data.stats.total;
            document.getElementById('st-wins').innerText = data.stats.wins;
            document.getElementById('st-wr').innerText = data.stats.winRate + '%';

            const allSignals = data.signals || [];
            
            // Логика "Нового сигнала" (30 секунд на экране)
            const activeOnly = allSignals.filter(s => s.status === 'active');
            if (activeOnly.length > 0) {
                const latest = activeOnly[activeOnly.length - 1];
                if (latest.id !== lastKnownSignalId) {
                    lastKnownSignalId = latest.id;
                    const alertDiv = document.getElementById('new-signal-alert');
                    alertDiv.style.display = 'block';
                    alertDiv.innerText = `🚀 NEW ${latest.type}: ВХОД $${latest.entry}`;
                    setTimeout(() => { alertDiv.style.display = 'none'; }, 30000);
                }
            }

            renderLists(allSignals);

        } catch (e) {
            console.error("Ошибка обновления дашборда");
        }
    }

    function renderLists(signals) {
        const activeCont = document.getElementById('active-list');
        const historyCont = document.getElementById('history-list');
        
        activeCont.innerHTML = '';
        historyCont.innerHTML = '';

        // Копируем и переворачиваем, чтобы новые были сверху
        [...signals].reverse().forEach(s => {
            const color = s.status === 'win' ? '#10b981' : (s.status === 'loss' ? '#ef4444' : '#f59e0b');
            const card = `
                <div class="signal-item" style="border-left-color: ${color}">
                    <div>
                        <div style="font-weight: 800; font-size: 0.9rem; color: ${s.type === 'BUY' ? '#10b981' : '#ef4444'}">
                            ${s.type} ${s.pair}
                        </div>
                        <div class="sig-meta">Вход: <b>$${s.entry}</b> | TP: $${s.tp}</div>
                        <div class="sig-meta">Создан: ${s.created_at}</div>
                    </div>
                    <div class="badge" style="background: ${color}20; color: ${color}">${s.status}</div>
                </div>
            `;

            if (s.status === 'active') {
                activeCont.innerHTML += card;
            } else if (s.status === 'win' || s.status === 'loss') {
                historyCont.innerHTML += card;
            }
        });
    }

    setInterval(updateDashboard, 5000);
    updateDashboard();
</script>

</body>
</html>
