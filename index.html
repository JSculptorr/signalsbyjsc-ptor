<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>JSculptor AI Trading</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; --win: #10b981; --loss: #ef4444; --active: #f59e0b; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        
        /* Блок цены */
        .main-card { background: var(--card); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #334155; margin-bottom: 20px; }
        .price { font-size: 2.5rem; font-weight: 800; margin: 10px 0; }
        
        /* Статистика */
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-item { background: var(--card); padding: 10px; border-radius: 12px; text-align: center; font-size: 0.8rem; border: 1px solid #334155; }
        .stat-item b { display: block; font-size: 1.1rem; }

        /* Новый сигнал Alert */
        #new-alert { display: none; background: var(--active); color: black; padding: 15px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* Списки */
        .section-title { font-size: 0.9rem; color: #94a3b8; margin: 20px 0 10px 5px; text-transform: uppercase; letter-spacing: 1px; }
        .signal-row { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--accent); }
        .signal-info div { font-size: 0.7rem; color: #94a3b8; }
        .status-badge { font-size: 0.7rem; padding: 4px 8px; border-radius: 6px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card">
        <div style="font-size: 0.7rem; letter-spacing: 2px; color: var(--accent);">JSCULPTOR AI SYSTEM</div>
        <div class="price" id="price">$0.00</div>
        <div style="font-size: 0.7rem; color: #475569;">Обновление каждые 30 сек</div>
    </div>

    <div class="stats-bar">
        <div class="stat-item"><span>Trades</span><b id="st-total">0</b></div>
        <div class="stat-item"><span>Wins</span><b id="st-wins" style="color: var(--win)">0</b></div>
        <div class="stat-item"><span>Win Rate</span><b id="st-wr">0%</b></div>
    </div>

    <div id="new-alert">🚀 ОБНАРУЖЕН НОВЫЙ СИГНАЛ!</div>

    <div class="section-title">Активные сигналы</div>
    <div id="active-list"></div>

    <div class="section-title">История сделок</div>
    <div id="history-list"></div>
</div>

<script>
    let lastSignalId = null;

    async function updateUI() {
        try {
            const res = await fetch('https://signalsbyjsc-ptor.onrender.com/api/data');
            const data = await res.json();

            // 1. Цена и Статистика
            document.getElementById('price').innerText = '$' + data.price.toLocaleString();
            document.getElementById('st-total').innerText = data.stats.total;
            document.getElementById('st-wins').innerText = data.stats.wins;
            document.getElementById('st-wr').innerText = data.stats.winRate + '%';

            // 2. Логика "Нового сигнала" (30 сек)
            const activeSignals = data.signals.filter(s => s.status === 'active');
            if (activeSignals.length > 0) {
                const latest = activeSignals[activeSignals.length - 1];
                if (latest.id !== lastSignalId) {
                    lastSignalId = latest.id;
                    const alertBox = document.getElementById('new-alert');
                    alertBox.style.display = 'block';
                    alertBox.innerText = `🚀 НОВЫЙ ${latest.type}: ${latest.entry}`;
                    setTimeout(() => { alertBox.style.display = 'none'; }, 30000);
                }
            }

            // 3. Рендер списков
            renderSignals(data.signals);

        } catch (e) { console.log("Связь с сервером..."); }
    }

    function renderSignals(allSignals) {
        const activeContainer = document.getElementById('active-list');
        const historyContainer = document.getElementById('history-list');
        
        activeContainer.innerHTML = '';
        historyContainer.innerHTML = '';

        allSignals.reverse().forEach(sig => {
            const html = `
                <div class="signal-row" style="border-left-color: ${getColor(sig.status)}">
                    <div class="signal-info">
                        <b style="color: ${sig.type === 'BUY' ? '#10b981' : '#ef4444'}">${sig.type} ${sig.pair}</b>
                        <div>Вход: $${sig.entry} | TP: $${sig.tp}</div>
                        <div>Время: ${sig.created_at}</div>
                    </div>
                    <div class="status-badge" style="background: ${getColor(sig.status)}15; color: ${getColor(sig.status)}">
                        ${sig.status}
                    </div>
                </div>
            `;

            if (sig.status === 'active') {
                activeContainer.innerHTML += html;
            } else if (sig.status === 'win' || sig.status === 'loss') {
                historyContainer.innerHTML += html;
            }
        });
    }

    function getColor(status) {
        if (status === 'win') return '#10b981';
        if (status === 'loss') return '#ef4444';
        return '#f59e0b';
    }

    setInterval(updateUI, 5000);
    updateUI();
</script>
</body>
</html>
